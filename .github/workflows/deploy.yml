name: Deploy Sentinel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build API image
      - name: Extract API metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/getpayd-tech/sentinel-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./sentinel-api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha,scope=sentinel-api
          cache-to: type=gha,mode=max,scope=sentinel-api

      # Build UI image
      - name: Extract UI metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/getpayd-tech/sentinel-ui
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push UI
        uses: docker/build-push-action@v6
        with:
          context: ./sentinel-ui
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          cache-from: type=gha,scope=sentinel-ui
          cache-to: type=gha,mode=max,scope=sentinel-ui

      # Deploy to server
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /apps/sentinel
            docker compose pull
            docker compose up -d

            echo "Waiting for API health check..."
            for i in $(seq 1 12); do
              if docker exec sentinel-api curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "Health check failed after 60s"
                docker logs sentinel-api --tail 50
                exit 1
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            docker image prune -f
            echo "Sentinel deployed successfully"
