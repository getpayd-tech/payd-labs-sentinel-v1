name: Deploy {DISPLAY_NAME}

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: {BUILD_CONTEXT}
          push: true
          tags: |
            {GHCR_IMAGE}:latest
            {GHCR_IMAGE}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via Sentinel
        run: |
          PAYLOAD='{"project": "{PROJECT_NAME}", "image_tag": "${{ github.sha }}", "triggered_by": "${{ github.actor }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.SENTINEL_WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf -X POST {SENTINEL_URL}/api/v1/deployments/webhook \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
